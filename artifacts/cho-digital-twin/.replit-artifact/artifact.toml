kind = "web"
previewPath = "/"
title = "CHO Cell Culture Digital Twin"
version = "1.0.0"
id = "artifacts/cho-digital-twin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24073

[services.development]
run = "pnpm --filter @workspace/cho-digital-twin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cho-digital-twin", "run", "build" ]
publicDir = "artifacts/cho-digital-twin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24073"
BASE_PATH = "/"
